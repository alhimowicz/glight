name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install glib tools
        run: sudo apt-get install -y libglib2.0-bin

      - name: Typecheck
        run: npm run typecheck

      - name: Pack extension
        run: make pack

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: releases/glight@glight.dev.zip
          generate_release_notes: true
